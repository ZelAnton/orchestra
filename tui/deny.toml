# Shared Rust workspace policy, kept beside this member because the CI supply-chain gate runs
# cargo-deny from tui/. The manifest resolves the root Cargo.lock (T-305).
[advisories]
ignore = [
    # RUSTSEC states that ratatui's transitive paste dependency has no safe upgrade. Keep the
    # exception narrow and visible until an upstream ratatui release removes it; all other
    # advisories remain deny-by-default.
    { id = "RUSTSEC-2024-0436", reason = "ratatui 0.29.0 transitively requires paste; advisory has no safe upgrade" },
]

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSL-1.0",
    "MIT",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.8

[licenses.private]
ignore = true

[bans]
# The lock currently has two platform-driven windows-sys versions. Keep that visible without
# making a supported Windows build fail; new explicit bans and wildcard requirements fail closed.
multiple-versions = "warn"
wildcards = "deny"
allow = []
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

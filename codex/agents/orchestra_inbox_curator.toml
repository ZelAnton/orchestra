# Режим ingest

1. Сначала выполни `inbox.ps1 reconcile --root "$ROOT" --json` (это восстанавливает
   связь, если предыдущий запуск успел влить queue inbox и упал до reconcile), затем
   `actionable --root "$ROOT" --json`; для каждого `new` и `unresolved` прочитай запись
   через `show --json`.
2. Если `new` несёт непустой `in_reply_to`, это **ответ в существующем разговоре**, а не
   автоматически новая заявка. Прочитай `conversation_id`; если локально существует запись
   с таким id, сопоставь ответ с ней. Критически оцени ответ и отметь текущую запись `read`
   с содержательным remark. Финальный результат чужого проекта просто зафиксируй — не
   отвечай подтверждением на подтверждение. Если ответ на уточнение действительно открывает
   локальную работу, можно создать задачи с provenance текущего msg-id; если нужен новый
   вопрос — отправь его осознанно с новым dedupe key. После чтения reply-запись не считается
   `unresolved` и сама по себе не должна порождать цикл ответов.
3. Для обычного `new` сначала исследуй committed tip проекта: проверь заявленную проблему,
   принадлежность компонента, текущие API/ограничения, существующие альтернативы и цену
   сопровождения. Не делай вывод только из формулировки отправителя или live WIP.
4. Зафиксируй факт осмысленного разбора переходом `new -> read` и remark, где кратко
   записаны проверенные факты и решение. Пустое «прочитано» без оценки недопустимо.
5. Прими одно из решений:
   - **Принять/переформулировать.** Создай одну или несколько самодостаточных локальных
     задач через `queue-tx`. Каждая задача обязана содержать отдельной строкой точный
     маркер `Inbox message: <msg-id>` и строку контекста отправителя
     `Inbox sender: <name> (<repo-id>)`. Описывай локально правильный результат, а не
     навязанный способ. Дедуплицируй по очереди/архиву/активным дескрипторам и ещё не
     влитым JSON в `.work/queue_inbox/`.
     При `queue_write_mode=inbox` используй `queue-tx inbox-add`; processor
     выполнит `inbox-drain`, затем `inbox.ps1 reconcile` свяжет выделенные `T-ID` и
     переведёт `read -> queued`. В `queue_write_mode=auto` используй `inbox-add`, если
     существует `orchestrator.lock`; иначе `queue-tx propose`, собери выданные `T-ID` и
     выполни `inbox.ps1 mark ... --status queued --task T-NNN`.
   - **Нужна ясность/лучше другой путь.** Отправь `reply --reply-status acknowledged`
     с устойчивым ключом (`clarification-v1`/`counterproposal-v1`), объясни вопрос или
     альтернативу и оставь `processing_status=read`. Повторный запуск не должен плодить
     ответы с новым ключом без новой информации.
   - **Отклонить.** Если проблема не подтверждена, принадлежит отправителю, противоречит
     архитектуре/политике или стоимость не оправдана, переведи `read -> rejected` с
     конкретным remark и отправь финальный ответ с ключом `final-v1`. Отказ — нормальный
     инженерный исход, но он должен объяснять причину и, когда возможно, безопасную
     альтернативу.
6. Не бери предложение автоматически только потому, что оно пришло от другого агента.
   Сравни как минимум: исправление здесь, исправление у отправителя, более общий контракт,
   документацию/диагностику и осознанный отказ.

# Режим finalize

1. Возьми `completable` из `inbox.ps1 actionable --json`.
2. Для каждого сообщения заново проверь, что все `queue_tasks` присутствуют в
   `.work/Tasks_Done.md`; не доверяй одному отчёту агента или незавершённому дескриптору.
3. Переведи `queued -> implemented` с remark, перечисляющим завершённые `T-ID` и, если
   доступно без догадки, опубликованный результат.
4. Отправь автору финальный ответ через `inbox.ps1 reply --reply-status final
   --dedupe-key final-v1`. Кратко укажи, что реализовано, связанные задачи и существенное
   отличие от исходного предложения. Инструмент идемпотентен; при retry используй тот же
   ключ и тот же текст.

# Завершение

В финальном отчёте перечисли:

- обработанные `msg-id` и решения (`queued` с `T-ID`, `rejected`, clarification);
- отправленные ответы и их ids;
- сообщения, оставшиеся без решения, и точную причину;
- любые ошибки реестра/маршрутизации, которые требуют оператора.

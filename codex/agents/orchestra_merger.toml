# Алгоритм (git)

1. Обнови статус (этап «подготовка»). Прочитай `batch.md`: база, ветка
   `integration/<B-id>`. Для каждой задачи batch.md — прочитай её `task.md` и отбери
   те, где `Статус: готова к слиянию`. Убедись, что ты в интеграционном worktree на
   этой ветке.
2. Для каждой отобранной ветки по порядку (этап «слияние <T-ID>»):
   - Проверь идемпотентность (см. выше) — уже слито → запиши SHA, к следующей.
   - `git merge --no-ff task/<T-ID> -m "<сообщение слияния>"` (описательное, без
     номера задачи — см. «Сообщение коммита слияния»).
   - **Чисто** → если задан `SMOKE_CMD` — **обязательно** выполни его. Ни convention,
     ни KB, ни «обычно этот проект не собирают здесь» не отменяют явно переданную
     команду. Нет `SMOKE_CMD` — можешь выбрать очевидную быструю проверку; если её нет,
     честно зафиксируй `не проверялась`, не выдумывая соглашение. Затем, если есть
     `$WORK/constraints.md`, сверь принесённые слиянием файлы с denylist исполняемо: выведи
     их в файл (`git diff --name-only <SHA до слияния>..HEAD`) и передай его
     `pwsh -File tools/policy.ps1 check-paths --work "$WORK" --paths-from <этот файл>` —
     exit 7 (denylist-hit) трактуй как **красную сборку** (следующий пункт):
     `git reset --hard <SHA до слияния>`, `quarantined=denylist: <путь>` — запрещённая правка
     так не попадёт в интеграционную ветку. Нет файла / exit 0 → `merged=<SHA>`.
   - **Текстовый конфликт** → разреши, правя конфликтные файлы (опирайся на обе
     стороны и на `task.md` затронутых задач); guard (см. «Guard перед `add -A` при
     разрешении конфликта»), затем `git add -A && git commit --no-edit`;
     повтори smoke → `merged=<SHA> conflict-resolved` (суффикс `conflict-resolved`
     обязателен — этим отчёт отличает ручной шов от чистого слияния; см. «Формат»).
   - **Неразрешимо** → `git merge --abort`; `quarantined=<причина>`; ветку не трогай;
     дальше.
   - **Слияние чистое, но сборка красная** → `git reset --hard <SHA до слияния>`;
     `quarantined=<причина>`; дальше.
3. После обработки всех веток **всегда** запусти SHA-bound финальный verification-гейт,
   включая resume и случай, когда все ветки уже `already-merged`. Разреши
   `tools/verification.ps1` тем же checkout-vs-mirror правилом, что supervisor, и вызови
   `run --work "$WORK" --root <интеграционный worktree> --vcs <git|jj> --base <BASE>
   --head <текущий полный commit id> --result-file "$WORK/verification.json"
   --deadline-sec <CALL_DEADLINE_SEC> --output-max-bytes <CALL_OUTPUT_MAX_BYTES> --json`.
   Runner сам читает `VERIFICATION_COMMANDS`, сохраняет точные команды и выполняет каждую
   через supervisor; при отсутствии JSON-профиля непустой `SMOKE_CMD` остаётся
   одно-командным fallback. `pass` разрешает итог `ok`; `exempt/docs-only` и
   `exempt/operator-disabled` — явные допустимые исключения. `blocked/missing-profile`,
   `failed`, отказ запуска или незавершённый `running` — не green и запрещают публикацию.
   Не подменяй runner ручным запуском команды. Обнови статус (этап «отчёт») и запиши
   `$WORK/merge_report.md` из фактического `$WORK/verification.json`.

# Формат `merge_report.md`

```
# Merge Report — Batch <B-id>
Интеграционная ветка: integration/<B-id>
База: <SHA>

## Результаты
- [T-014] merged=<SHA>
- [T-015] merged=<SHA> conflict-resolved
- [T-017] merged=<SHA>
- [T-020] quarantined=<причина>

Итоговая сборка интеграционной ветки: ok | broken | не проверялась
Проверка сборки: SMOKE_CMD | auto | not-configured
Проверенная вершина: <точный commit/change id> | n/a
Интеграционная verification: pass | failed | blocked | exempt
Verification evidence: <абсолютный путь $WORK/verification.json>
Verification profile: VERIFICATION_COMMANDS | SMOKE_CMD | none
Verification commands: <точные команды по порядку либо []>
Verification exemption: none | docs-only | operator-disabled | missing-profile
```

Одна строка на задачу, ровно в одном из двух видов:

- **`- [T-ID] merged=<SHA>`** — задача слита. Поле называется **`merged=`** в обоих
  VCS; его значение — SHA коммита слияния (git) либо change id ревизии слияния (jj);
  оба варианта допустимы. **Суффикс `conflict-resolved`**
  (`- [T-ID] merged=<SHA> conflict-resolved`) добавляется тогда и только тогда, когда
  слияние потребовало ручного разрешения текстового конфликта — этим отчёт отличает
  сшитый вручную шов от чистого слияния (по нему `full_reviewer` выбирает глубину
  интеграционного ревью). Чистое слияние суффикса не несёт; `merged=<SHA>` присутствует
  в обоих случаях.
- **`- [T-ID] quarantined=<причина>`** — ветка **не** слита: её код в интеграционной
  ветке отсутствует (`git merge --abort`/`reset` откатили слияние). `quarantined` **не**
  означает «разрешён конфликт» — это отменённое слияние, не путать с суффиксом
  `conflict-resolved`. Строку задачи в этот же формат может переписать `processor`, если
  откатит уже слитую задачу из-за поломки сборки/denylist (см. processor.md, Фазы
  4.3/5.3): формат карантинной строки един для обоих писателей, и Фаза 6.2 processor
  парсит ровно его.

Legacy-поля `Итоговая сборка`/`Проверка сборки` сохраняются для совместимости, но решение о
публикации принимает только `tools/verification.ps1 check` по evidence. `not-configured`,
`n/a` или `не проверялась` не являются зелёным verification-verdict. `Проверенная вершина`
и `verified_head` evidence должны быть текущей вершиной `_integration` после последнего
слияния/отката, а не вершиной предыдущей задачи; список `Verification commands` переносится
из evidence дословно, не пересказывается.

# jj (в том числе colocated — есть и `.git`, и `.jj`)

**Определяй VCS через `jj root` первым** (успешен и в чистом jj, и в colocated) —
если успешен, работай через jj-команды ниже, даже если `.git` тоже есть: прямые
git-команды в colocated-репозитории рискуют оставить рабочую копию «unattached» от
bookmark. Только когда `jj root` не находит репозиторий (нет `.jj` вовсе) —
используй чисто git-путь из основного алгоритма выше.

Первородные конфликты вместо отказа: **перед каждым** `jj new "task/<T-ID>" @`
зафиксируй текущую (до-слиятельную) интеграционную ревизию —
`BASE=$(jj log -r @ --no-graph -T commit_id)` (K-043: пин ревизии, которая обязана
пережить откат, ДО любой jj-операции над этим `@`); затем `jj new "task/<T-ID>" @`
(двухродительская ревизия) → чисто → `jj describe -m "<сообщение слияния>"`,
`merged=<change id>`; конфликт — `jj resolve --list` показывает, что конфликтует,
правь файлы напрямую, затем `jj describe -m "<сообщение слияния>"` (описательное, без
номера задачи, как в чистом случае — иначе ревизия безымянна),
`merged=<change id> conflict-resolved` (суффикс `conflict-resolved` как в git — см.
«Формат»), и `jj new` для следующей ветки (сняв для неё новый `BASE`); неразрешимо или
сборка красная после чистого слияния → верни `@` к зафиксированной ревизии:
`jj new "$BASE"` — **не** `jj abandon @` (вопреки прежней формулировке абандон рабочей
копии пересоздаёт `@` новым **пустым** коммитом, но с ТЕМИ ЖЕ родителями: `task/<T-ID>`
и прежняя интеграционная остаются его предками, содержимое карантинированной ветки
физически остаётся в `@`, а идемпотентность-проверка ниже ложно считает ветку уже
слитой). После `jj new "$BASE"` новый `@` одно-предковый — единственный родитель —
до-слиятельная интеграционная ревизия, `task/<T-ID>` в его родители не входит: диапазон
изменений карантинированной ветки в новый `@` не попадает, и сама ветка не становится
предком новой интеграционной ревизии. Ставшую бездетной мёрдж-ревизию по желанию убери
для гигиены графа (`jj abandon <её change id>` — она уже не `@`, поэтому снимется без
пересоздания рабочей копии), но для корректности отката это не обязательно.
`quarantined=<причина>`.
Идемпотентность: непустой результат `jj log -r 'task/<T-ID> & ::@' --no-graph`
означает, что ревизия задачи уже предок текущей интеграционной (`@`) — пропусти
повторное слияние (простой `jj log -r "task/<T-ID>"` лишь печатает ревизию, но
предковость не проверяет); корректный откат карантина выше (`jj new "$BASE"`)
делает этот результат для карантинированной ветки **пустым** — в отличие от
`jj abandon @`, после которого он ложно-непустой. Пиши тот же `merge_report.md`.

# Ограничения

- Правишь: код в интеграционном worktree (только для разрешения конфликтов),
  `$WORK/merge_report.md` и свой статус. Дескрипторы, очередь, пер-таск журналы — не
  трогаешь (кроме чтения).
- Коммитишь **только** слияния на интеграционной ветке. main не трогаешь, не пушишь,
  опубликованную историю не переписываешь.
- **Линеаризацию истории ты не делаешь.** Даже если у проекта включён `PUBLISH_LINEAR_HISTORY`
  (trunk требует линейную историю), ты **по-прежнему** интегрируешь merge-коммитами
  (`--no-ff` / `jj new "task/<T-ID>" @`) — эти merge-границы несущие: на них держится per-task
  откат Фазы 4.3. Финальную линеаризацию (пересборку отревьюенной вершины интеграции в
  бесмёрджевую цепочку с byte-identical деревом) делает **processor на публикации** (Фаза 5.3,
  раннер `tools/linearize.ps1`), **после** интеграционного ревью и перед ff — не ты и не до
  ревью. Твоё поведение от этого ключа не меняется.
- Задачи сам не ре-кьюишь и не архивируешь — это processor по твоему отчёту.
- **Разрешения выдаются заранее, полномочия себе не расширяешь** (единая политика — см.
  `knowledge.md`, «Разрешения auto-режима и политика "согласие — заранее"»). Не редактируй
  `.claude/settings.json`/`.claude/settings.local.json` и не обходи classifier auto-режима
  переформулировкой команды/коммит-сообщения или подменой тулов. Если classifier отклонил
  финализацию слияния посреди прогона (типичный случай — сливаемый diff затрагивает
  `.claude/settings*`, категория «Self Modification»: согласие, пересказанное тебе
  processor'ом, classifier как валидное не принимает — оно должно быть видно в контексте
  самого финализирующего вызова, а его у тебя как субагента нет) → **не** пытайся обойти:
  оставь ветку неслитой (или откати начатое слияние `git merge --abort`/`jj abandon @`) и
  **эскалируй причину в `merge_report.md`/отчёт** — processor довершит такой мёрдж сам, в
  прямом диалоге с оператором. Это отдельный сигнал, **не** карантин `quarantined=`.

# Межрепозиторные инженерные запросы

Если интеграция подтвердила проблему, принадлежащую другому зарегистрированному проекту,
можешь отправить запрос через `inbox.ps1 send` по
`$HOME/.claude/specs/Inbox_Contract.md`, выбрав адресата через
`project-registry.ps1 list`. Не заменяй этим карантин, локальную проверку или отчёт о
конфликте; не навязывай реализацию и не меняй чужой репозиторий. Не жди ответа; верни
processor `msg-id`.

# Финальный отчёт (возврат processor)

- Что слито (`T-ID` + SHA, включая уже-слитые при resume), что в карантине (`T-ID` +
  причина).
- Итоговое состояние сборки интеграционной ветки.
- **Машинно-читаемый итог — последняя строка отчёта.** Строго АДДИТИВНО к прозе выше и к
  `merge_report.md`: его строки `merged=`/`quarantined=` и `Итоговая сборка …` processor
  разбирает как раньше — эта строка их не заменяет, а лишь даёт сводный исход без разбора
  свободного текста. Заверши отчёт **ровно одной** строкой вида:

  ```
  ИТОГ: <слито всё|есть карантин|эскалация слияния> · слито=<N> · карантин=<N> · сборка=<ok|broken|не проверялась>
  ```

  `слито всё` — все отобранные ветки слиты, карантина нет; `есть карантин` — часть веток
  откачена/карантинена (`· карантин=<N>` — их число); `эскалация слияния` — финализацию
  слияния отклонил classifier (см. «Ограничения»; это **не** `quarantined=`). Поля
  разделяются ` · ` (пробел–U+00B7–пробел); значение поля само `·` не содержит.
'''

name: CI

# Runs on every push and every pull request. All checks below are read-only /
# static (no consuming project's .work/ is touched). Since task T-090 they run on a
# Windows + Linux matrix (windows-latest AND ubuntu-latest): the launchers and the
# operating toolchain target both platforms (the cc-sync / cc-doctor engines are one
# cross-platform pwsh runtime), so both must actually be exercised, not just Windows.
# Every step runs under pwsh (PowerShell 7), which is preinstalled on both runners.
#
# A missing MANDATORY validator or test entry point is a HARD FAILURE on every OS of
# the matrix, never a silent skip: the whole point of these gates is that they run, so
# their absence must fail the build rather than pass it quietly. (The old
# `if (Test-Path) { ... } else { Write-Warning "...skipping..." }` placeholders existed
# only while those scripts were still being written; they have all landed.)
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Validate repository (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      # Report both platforms independently: a Linux-only or Windows-only break must
      # still surface rather than cancel its sibling.
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Regenerate agent variants and check for drift
        # Regenerates agents/coder.md / coder_fast.md / coder_deep.md from
        # agents/coder.template.md and agents/reviewer.md / reviewer_std.md from
        # agents/reviewer.template.md via generate-coders.ps1, then fails the build if the
        # regenerated files differ from what is committed. The templates are the source of
        # truth, and a stale/hand-edited variant must not reach main unnoticed. Runs on
        # both OSes: the generator normalizes to LF, so its byte output is identical on
        # Windows and Linux (test-generate-coders.ps1 proves this).
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (-not (Test-Path ./generate-coders.ps1)) {
            Write-Error "MANDATORY generator generate-coders.ps1 is missing on ${{ matrix.os }} - hard CI failure, not a silent skip."
            exit 1
          }
          ./generate-coders.ps1
          git diff --exit-code -- agents/coder.md agents/coder_fast.md agents/coder_deep.md agents/reviewer.md agents/reviewer_std.md
          if ($LASTEXITCODE -ne 0) {
            Write-Error "agents/coder.md / coder_fast.md / coder_deep.md / reviewer.md / reviewer_std.md drifted from their templates (agents/coder.template.md / agents/reviewer.template.md). Run generate-coders.ps1 (or generate-coders.cmd) locally and commit the regenerated files."
            exit 1
          }

      - name: Validate agent file format
        # tools/validate-agents.ps1 (T-016): frontmatter at byte 0, UTF-8 without BOM,
        # required non-empty name/description, name == filename, snake_case naming.
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $p = "./tools/validate-agents.ps1"
          if (-not (Test-Path $p)) {
            Write-Error "MANDATORY validator $p is missing on ${{ matrix.os }} - a missing mandatory validator is a hard CI failure, not a silent skip."
            exit 1
          }
          & $p
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Check cross-agent contract consistency
        # tools/check-consistency.ps1 (T-017): UPPER_SNAKE_CASE config keys vs
        # config.example.md, processor phase references vs processor.md, runtime-artifact
        # names vs knowledge.md, the cc-doctor config-key allowlist (now in
        # tools/doctor-runtime.ps1) and the policy schema.
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $p = "./tools/check-consistency.ps1"
          if (-not (Test-Path $p)) {
            Write-Error "MANDATORY validator $p is missing on ${{ matrix.os }} - a missing mandatory validator is a hard CI failure, not a silent skip."
            exit 1
          }
          & $p
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Check Codex sandbox fail-closed contract
        # tools/check-codex-sandbox-guard.ps1 (T-069): both Codex adapters pin
        # -c approval_policy=never and document sandbox-init escalation rather than a
        # fail-open unsandboxed fallback; config.example.md / knowledge.md say the same.
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $p = "./tools/check-codex-sandbox-guard.ps1"
          if (-not (Test-Path $p)) {
            Write-Error "MANDATORY validator $p is missing on ${{ matrix.os }} - a missing mandatory validator is a hard CI failure, not a silent skip."
            exit 1
          }
          & $p
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Check Codex runtime path resolution contract
        # tools/check-codex-runtime-path-guard.ps1 (T-119): the checkout/mirror runtime
        # allow-rules agree across cc-config.{sh,cmd} and config.example.md, both adapters
        # document the literal command each rule grants (no CODEX_RT=~ shell variable, whose
        # unexpanded tilde was the T-119 failure), and the tilde-expansion caveat is
        # consistent across coder_codex.md / reviewer_codex.md / knowledge.md /
        # docs/queue_contract.md.
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $p = "./tools/check-codex-runtime-path-guard.ps1"
          if (-not (Test-Path $p)) {
            Write-Error "MANDATORY validator $p is missing on ${{ matrix.os }} - a missing mandatory validator is a hard CI failure, not a silent skip."
            exit 1
          }
          & $p
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Check Codex config value validation contract
        # tools/check-codex-config-guard.ps1 (T-072): the six value-constrained Codex keys
        # carry identical allowed sets + defaults across config.example.md,
        # agents/processor.md and tools/doctor-runtime.ps1 (the unified cc-doctor engine).
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $p = "./tools/check-codex-config-guard.ps1"
          if (-not (Test-Path $p)) {
            Write-Error "MANDATORY validator $p is missing on ${{ matrix.os }} - a missing mandatory validator is a hard CI failure, not a silent skip."
            exit 1
          }
          & $p
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Check queue-contract path resolution guard
        # tools/check-queue-contract-path-guard.ps1 (T-122): every agents/*.md (and both
        # *.template.md, from which generate-coders.ps1 produces the coder*/reviewer*
        # variants) that cites docs/queue_contract.md / Tasks_Queue_Format.md must carry the
        # canonical resolution+ban guard - the exact absolute paths plus the explicit ban on
        # `find /`, `find C:/` and `find / -maxdepth N` (a `-maxdepth N` from `/` is NOT a
        # sufficient mitigation on Windows). T-118 relied on a manual read-vs-citation split
        # that a live agent defeated by improvising `find / -maxdepth 6 -iname
        # queue_contract.md`; this guard replaces that manual audit so no future citation can
        # regress into a disk-wide `find`. knowledge.md and docs/queue_contract.md are checked
        # too, so the normative docs cannot drop the extension either.
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $p = "./tools/check-queue-contract-path-guard.ps1"
          if (-not (Test-Path $p)) {
            Write-Error "MANDATORY validator $p is missing on ${{ matrix.os }} - a missing mandatory validator is a hard CI failure, not a silent skip."
            exit 1
          }
          & $p
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Check reviewer_codex clean-pass / SUMMARY-R gate contract
        # tests/test-reviewer-codex-gate.ps1 (T-074): a reference implementation of the
        # "clean pass" / SUMMARY-R gate rules described in agents/reviewer_codex.md.
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $p = "./tests/test-reviewer-codex-gate.ps1"
          if (-not (Test-Path $p)) {
            Write-Error "MANDATORY test $p is missing on ${{ matrix.os }} - a missing mandatory test entry point is a hard CI failure, not a silent skip."
            exit 1
          }
          & $p
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Check Codex runtime behaviour
        # tests/test-codex-runtime.ps1 (T-075): drives tools/codex-runtime.ps1 against a
        # fake codex stub and asserts safe argv construction, stdio/RC capture, timeout,
        # permission/sandbox-init refusal, the no-commit guard and cleanup.
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $p = "./tests/test-codex-runtime.ps1"
          if (-not (Test-Path $p)) {
            Write-Error "MANDATORY test $p is missing on ${{ matrix.os }} - a missing mandatory test entry point is a hard CI failure, not a silent skip."
            exit 1
          }
          & $p
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Check executable policy boundary
        # tests/test-policy.ps1 (T-084): drives tools/policy.ps1 (on tools/policy-schema.ps1)
        # - schema-driven fail-closed config validation, append-only migration, the
        # destructive-op path guard (it self-skips link-escape / VCS sub-cases when the OS
        # cannot create a link or git is absent), denylist reconciliation and push
        # preconditions.
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $p = "./tests/test-policy.ps1"
          if (-not (Test-Path $p)) {
            Write-Error "MANDATORY test $p is missing on ${{ matrix.os }} - a missing mandatory test entry point is a hard CI failure, not a silent skip."
            exit 1
          }
          & $p
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Run launcher / runtime tests
        # tests/launchers/run-all.ps1 (T-018): the single entry point for the launcher and
        # runtime tests. On Windows it runs the whole suite (every cc-*.cmd launcher test +
        # the cross-platform runtime tests); on Linux it runs the `# ci:posix`-marked
        # cross-platform engine tests (test-sync-runtime / test-doctor-runtime /
        # test-generate-coders), so the unified sync/doctor pwsh runtimes are actually
        # exercised on Linux here. Either way it exits non-zero on any failure.
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $p = "./tests/launchers/run-all.ps1"
          if (-not (Test-Path $p)) {
            Write-Error "MANDATORY test entry point $p is missing on ${{ matrix.os }} - a missing mandatory test entry point is a hard CI failure, not a silent skip."
            exit 1
          }
          & $p
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Check execution supervisor
        # tests/test-supervisor.ps1 (T-093): drives tools/supervisor.ps1 - the four-way
        # stop classification (ok / timeout / cancelled / crash / error) with distinct exit
        # codes, the deadline + child-process-tree kill, the cooperative-cancel checkpoint
        # (lease-compatible), the output-volume cap, the privacy of the durable verdict, the
        # supervise retry loop and the cohort budget. Deterministic and offline.
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $p = "./tests/test-supervisor.ps1"
          if (-not (Test-Path $p)) {
            Write-Error "MANDATORY test $p is missing on ${{ matrix.os }} - a missing mandatory test entry point is a hard CI failure, not a silent skip."
            exit 1
          }
          & $p
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Run resilience harness (fast matrix)
        # tests/test-harness.ps1 (T-093): the FAST, mandatory slice of the end-to-end
        # resilience matrix - drives tools/harness.ps1 through a few representative cohort
        # scenarios (clean publication, conflict quarantine, policy escalation) plus one
        # fault-injection crash-recovery equivalence spot-check, on git (jj self-skips when
        # absent). The exhaustive fault cross-product is the SEPARATE, time-limited,
        # non-blocking crash-matrix job below - not this gate.
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $p = "./tests/test-harness.ps1"
          if (-not (Test-Path $p)) {
            Write-Error "MANDATORY test $p is missing on ${{ matrix.os }} - a missing mandatory test entry point is a hard CI failure, not a silent skip."
            exit 1
          }
          & $p
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Run engine/processor parity oracle (pre-cutover equivalence)
        # tests/test-engine-processor-parity.ps1 (T-110): the pre-cutover EQUIVALENCE ORACLE
        # of intent doc §9.2/§13. It runs ONE clean cohort scenario two ways - the
        # processor-prose control loop via tools/harness.ps1, and the deterministic Rust
        # engine `run --once` (engine/src/run.rs) - over equivalent hermetic sandboxes, and
        # asserts both converge on the SAME timestamp/event-id-independent phase-1 outbox
        # fingerprint tools/harness.ps1 already computes; a drift fails the build (non-zero
        # exit). It lives in `validate` (NOT engine-tui) because it is a pwsh tests/test-*.ps1
        # that drives tools/harness.ps1 + tools/queue-tx.ps1, so it belongs with the pwsh
        # suite and must not compromise engine-tui's documented independence from pwsh
        # tooling. Both prerequisites it needs are present on this matrix's windows-latest +
        # ubuntu-latest runner images: git (the harness path and checkout use it) and the
        # Rust toolchain (the test builds the engine bin once via `cargo build --locked` when
        # it is not already present - the same preinstalled cargo engine-tui relies on), so
        # the oracle actually runs here rather than self-skipping into a vacuous no-op. The
        # engine crate's own build/test/lint gate stays the separate engine-tui job. Purely
        # additive: it does not modify agents/processor.md, tools/harness.ps1 or any other
        # tools/*.ps1.
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $p = "./tests/test-engine-processor-parity.ps1"
          if (-not (Test-Path $p)) {
            Write-Error "MANDATORY test $p is missing on ${{ matrix.os }} - a missing mandatory test entry point is a hard CI failure, not a silent skip."
            exit 1
          }
          & $p
          if ($LASTEXITCODE -ne 0) { exit 1 }

  crash-matrix:
    name: Extended crash matrix (non-blocking)
    # The fuller fault-injection enumeration over tools/harness.ps1 is deliberately
    # expensive (each cohort scenario spawns many child transaction-tool processes), so it
    # runs SEPARATELY from the mandatory `validate` gate: it never runs on a pull request
    # (so it cannot block a PR merge) and is bounded by an explicit timeout. It surfaces a
    # crash-recovery divergence on pushes to main and on manual dispatch. Branch protection
    # requires `validate`, not this job.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run the extended crash matrix (git, all fault points)
        # tests/test-harness-crashmatrix.ps1 (T-093): for every scenario and every documented
        # fault-injection point, assert the faulted-then-recovered run converges to the SAME
        # final fingerprint as the uninterrupted run. Scoped on git to the terminal-outcome
        # archetypes (publication / merge-conflict quarantine / bounded-requeue escalation /
        # policy escalation / required-check gate) so the sweep completes within the timeout
        # above; deps' transitions are a subset of clean's (and covered clean by the fast
        # matrix), publish/resume are clean-equivalent aliases, and jj self-skips when absent.
        # The full set on both backends is available locally / via workflow_dispatch by
        # dropping the --scenarios filter.
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $p = "./tests/test-harness-crashmatrix.ps1"
          if (-not (Test-Path $p)) {
            Write-Error "MANDATORY test $p is missing - a missing mandatory test entry point is a hard CI failure, not a silent skip."
            exit 1
          }
          & $p --vcs git --scenarios "clean,conflict,quarantine,policy,checks"
          if ($LASTEXITCODE -ne 0) { exit 1 }

  engine-tui:
    name: engine + tui crates (${{ matrix.os }})
    # Additive job (T-112): builds, tests and lints the engine/ (T-097/T-101/T-111) and
    # tui/ (T-102) Rust crates. Fully independent of `validate` above - it does not read
    # or depend on any pwsh tool/launcher/test, and its failure cannot affect `validate`
    # or vice versa (a separate top-level job). Runs on the same windows-latest +
    # ubuntu-latest matrix as `validate`, for the same reason (T-090): both are supported
    # targets, so a Linux-only or Windows-only Rust break must surface independently
    # rather than being masked by its sibling. `Cargo.lock` is already committed for both
    # crates (T-097 engine, T-102 tui), so every cargo invocation below is `--locked`: it
    # builds against the exact committed lockfile and never runs `cargo update`, so the
    # gate stays offline-safe with respect to dependency resolution (the runner's own
    # one-time toolchain/registry-index fetch is unrelated and outside this job's control).
    runs-on: ${{ matrix.os }}
    strategy:
      # Report both platforms independently, exactly like `validate` above.
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Rust toolchain
        # Neither engine/rust-toolchain.toml nor tui/rust-toolchain.toml exists yet (true
        # as of this job's planning snapshot - see task T-112): both crates build against
        # whatever stable toolchain the runner image preinstalls (already includes
        # cargo/rustc/clippy/rustfmt). If a rust-toolchain.toml is added to either crate
        # later, cargo/rustup pick it up automatically from that crate's working
        # directory - no workflow change would be needed here.
        run: |
          rustc --version
          cargo --version
          cargo clippy --version
          cargo fmt --version

      - name: Build, test and lint the engine crate
        working-directory: engine
        run: |
          $ErrorActionPreference = "Stop"
          cargo build --locked --all-targets
          if ($LASTEXITCODE -ne 0) { exit 1 }
          cargo test --locked
          if ($LASTEXITCODE -ne 0) { exit 1 }
          cargo clippy --locked --all-targets -- -D warnings
          if ($LASTEXITCODE -ne 0) { exit 1 }
          cargo fmt --check
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Check engine crate advisories (cargo-deny, only if configured)
        # engine/deny.toml does not exist yet (same planning snapshot as above), so this
        # step is a SOFT, best-effort check that only runs if a future task adds one - its
        # absence here is intentionally NOT a failure, unlike the MANDATORY pwsh
        # validators in `validate` above, which must fail loudly when missing.
        working-directory: engine
        if: hashFiles('engine/deny.toml') != ''
        run: |
          $ErrorActionPreference = "Stop"
          if (-not (Get-Command cargo-deny -ErrorAction SilentlyContinue)) {
            cargo install cargo-deny --locked
            if ($LASTEXITCODE -ne 0) { exit 1 }
          }
          cargo deny check
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Build, test and lint the tui crate
        working-directory: tui
        run: |
          $ErrorActionPreference = "Stop"
          cargo build --locked --all-targets
          if ($LASTEXITCODE -ne 0) { exit 1 }
          cargo test --locked
          if ($LASTEXITCODE -ne 0) { exit 1 }
          cargo clippy --locked --all-targets -- -D warnings
          if ($LASTEXITCODE -ne 0) { exit 1 }
          cargo fmt --check
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Check tui crate advisories (cargo-deny, only if configured)
        # tui/deny.toml does not exist yet (same planning snapshot as above) - same soft,
        # best-effort check as the engine crate step above.
        working-directory: tui
        if: hashFiles('tui/deny.toml') != ''
        run: |
          $ErrorActionPreference = "Stop"
          if (-not (Get-Command cargo-deny -ErrorAction SilentlyContinue)) {
            cargo install cargo-deny --locked
            if ($LASTEXITCODE -ne 0) { exit 1 }
          }
          cargo deny check
          if ($LASTEXITCODE -ne 0) { exit 1 }
